<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>签到</title>
<link rel="stylesheet" href="/frontend/css/app.css">
</head>
<body>
<div class="container" id="app">
  <div style="text-align:center;padding:20px 0 12px">
    <h1 style="color:var(--brand)">&#x1f3e2; 实验室签到</h1>
    <p style="margin-top:4px">精准定位 · 快速签到</p>
  </div>

  <div class="card result-card result-success hidden" id="statusCard">
    <div class="result-icon">&#x2705;</div>
    <h2 id="statusTitle">已签到</h2>
    <p id="statusDetail"></p>
    <p class="mt-1" style="font-size:0.82rem;color:var(--ink-muted)" id="statusTime"></p>
  </div>

  <!-- GPS tip modal -->
  <div id="gpsTipOverlay" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:2000">
    <div style="background:rgba(255,255,255,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);max-width:340px;width:90%">
      <p style="font-weight:700;color:var(--brand);font-size:1rem">&#x1f4cd; 如何获得高精度定位？</p>
      <p style="font-size:.82rem;color:var(--ink-secondary);margin-top:12px;line-height:1.7;text-align:left">
        <b>iPhone:</b> 设置→隐私→定位服务→Safari→"使用App期间"<br>
        <b>Android:</b> 下拉→长按"位置"→高精度模式<br>
        <b>建议:</b> 靠近窗户或室外，等待GPS锁定
      </p>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
        <button class="btn btn-primary" onclick="dismissGpsTip()" style="font-size:.82rem;padding:8px 20px">知道了</button>
        <button class="btn btn-secondary" onclick="dismissGpsTipForever()" style="font-size:.78rem;padding:8px 16px">不再提示</button>
      </div>
    </div>
  </div>

  <div class="card" id="mainCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 id="stepTitle">第1步：验证位置</h3>
      <span class="badge badge-warning hidden" id="locationBadge">定位中...</span>
    </div>

    <div id="stepLocation">
      <p style="font-size:0.9rem;margin-bottom:12px">需要获取你的位置以确认在签到范围内</p>
      <button class="btn btn-primary btn-block" onclick="getLocation()" id="locBtn">&#x1f4cd; 获取位置</button>
      <div id="locResult" class="mt-2 hidden"></div>
    </div>

    <div id="stepName" class="hidden">
      <p style="font-size:0.9rem;margin-bottom:12px" id="stepNameDesc">确认身份信息，点击签到</p>
      <div class="input-group">
        <input type="text" class="input" id="userName" placeholder="输入姓名" required>
      </div>
      <button class="btn btn-primary btn-block btn-lg mt-3" onclick="submitByName()" id="checkinBtn">&#x2705; 确认签到</button>
      <div id="checkinResult" class="text-center mt-3 hidden"></div>
    </div>
  </div>

  <p class="text-center mt-2" style="font-size:0.75rem;color:var(--ink-muted)" id="tokenInfo"></p>
</div>

<script>
var API = window.location.origin;
var token = null, qrType = null, locationId = null;
var userLat = null, userLng = null, locationVerified = false, coordSource = null;

(function() {
  var p = new URLSearchParams(window.location.search);
  token = p.get('token'); qrType = p.get('type') || 'checkin'; locationId = p.get('location_id');
  if (token) {
    document.getElementById('tokenInfo').textContent = 'Session: ' + token.slice(0,8) + '... | ' + qrType;
    // Update UI text for checkout vs checkin
    if (qrType === 'checkout') {
      document.getElementById('checkinBtn').innerHTML = '&#x2705; 确认签退';
      document.getElementById('stepNameDesc').textContent = '确认身份信息，点击签退';
    }
    fetch(API + '/api/qr/validate/' + token).then(function(r){return r.json()}).then(function(d){
      if (!d.valid) showToast('二维码已过期', 'error');
      else document.getElementById('stepTitle').textContent = (d.location_name || '签到点') + ' - ' + (qrType === 'checkin' ? '签到' : '签退');
    });
  }
})();

(function() {
  var u = JSON.parse(localStorage.getItem('user') || '{}');
  if (u.id) {
    fetch(API + '/api/check/status?user_id=' + u.id).then(function(r){return r.json()}).then(function(d){
      if (d.is_checked_in) {
        document.getElementById('statusCard').classList.remove('hidden');
        document.getElementById('statusTitle').textContent = '已签到';
        document.getElementById('statusDetail').textContent = '地点: ' + (d.location_name || '-');
        var t = '签到: ' + new Date(d.check_in_time).toLocaleString();
        if (d.auto_checkout_at) t += ' | 自动签退: ' + new Date(d.auto_checkout_at).toLocaleTimeString();
        document.getElementById('statusTime').textContent = t;
      }
    });
  }
})();

// GPS tip
if (!localStorage.getItem('gpsTipDismissed')) document.getElementById('gpsTipOverlay').classList.remove('hidden');
function dismissGpsTip() { document.getElementById('gpsTipOverlay').classList.add('hidden'); }
function dismissGpsTipForever() { localStorage.setItem('gpsTipDismissed', '1'); document.getElementById('gpsTipOverlay').classList.add('hidden'); }

// Pre-load Gaode
var _amapReady = false;
(function() {
  var s = document.createElement('script');
  s.src = 'https://webapi.amap.com/maps?v=2.0&key=c8e18f605b4553734875dbc4d172be96&plugin=AMap.Geolocation';
  s.onload = function() { _amapReady = true; };
  s.onerror = function() { _amapReady = false; };
  document.head.appendChild(s);
})();

var _watchId = null;

function getLocation() {
  var btn = document.getElementById('locBtn');
  var badge = document.getElementById('locationBadge');
  var result = document.getElementById('locResult');
  if (_watchId !== null) { navigator.geolocation.clearWatch(_watchId); _watchId = null; }
  btn.disabled = true; btn.textContent = '定位中...';
  badge.classList.remove('hidden');
  badge.className = 'badge badge-warning'; badge.textContent = '定位中...';
  result.classList.add('hidden');

  // Try Gaode first
  if (_amapReady && window.AMap) {
    window.AMap.plugin('AMap.Geolocation', function() {
      var geo = new window.AMap.Geolocation({enableHighAccuracy: true, timeout: 5000});
      geo.getCurrentPosition(function(status, amapResult) {
        if (status === 'complete' && amapResult.position) {
          userLat = amapResult.position.lat;
          userLng = amapResult.position.lng;
          badge.className = 'badge badge-success';
          badge.textContent = '已定位 (' + (amapResult.accuracy || 30).toFixed(0) + 'm)';
          validateAndProceed(btn, badge, result, 'amap');
          return;
        }
        fallbackGPS(btn, badge, result);
      });
    });
  } else {
    fallbackGPS(btn, badge, result);
  }
}

function fallbackGPS(btn, badge, result) {
  if (!navigator.geolocation) {
    result.classList.remove('hidden');
    result.innerHTML = '<div class="badge badge-danger">浏览器不支持定位</div>';
    btn.disabled = false; btn.textContent = '获取位置';
    return;
  }
  badge.textContent = 'GPS搜索中...';
  _watchId = navigator.geolocation.watchPosition(
    function(pos) {
      navigator.geolocation.clearWatch(_watchId); _watchId = null;
      userLat = pos.coords.latitude; userLng = pos.coords.longitude;
      badge.className = 'badge badge-success';
      badge.textContent = '已定位 (' + pos.coords.accuracy.toFixed(0) + 'm)';
      validateAndProceed(btn, badge, result, 'wgs84');
    },
    function(err) {
      badge.className = 'badge badge-danger'; badge.textContent = '定位失败';
      var msg = err.code === 1 ? '请允许位置权限' : err.code === 2 ? '无GPS信号，请移至窗边' : '超时';
      result.classList.remove('hidden');
      result.innerHTML = '<div style="margin-bottom:8px;"><span class="badge badge-danger">' + msg + '</span></div><div style="text-align:center;"><button class="btn btn-secondary mt-2" onclick="getLocation()">重试</button></div>';
      btn.disabled = false; btn.textContent = '获取位置';
    },
    {enableHighAccuracy: true, timeout: 90000, maximumAge: 0}
  );
}

function validateAndProceed(btn, badge, result, source) {
  coordSource = source;
  if (locationId) {
    fetch(API + '/api/admin/validate-location', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({lat: userLat, lng: userLng, location_id: parseInt(locationId), source: source}),
    })
    .then(function(r){return r.json()})
    .then(function(d) {
      result.classList.remove('hidden');
      if (d.within_range) {
        result.innerHTML = '<div class="badge badge-success">&#x2705; 在范围内 (' + d.distance_meters + 'm / ' + d.max_meters + 'm)</div><p style="font-size:.78rem;margin-top:4px;color:var(--ink-muted)">' + (d.address || '') + '</p>';
        locationVerified = true;
        showNameStep();
      } else {
        result.innerHTML = '<div style="margin-bottom:8px;"><span class="badge badge-danger">&#x274c; 超出范围 (' + d.distance_meters + 'm / ' + d.max_meters + 'm)</span></div><div style="text-align:center;"><button class="btn btn-secondary mt-2" onclick="getLocation()">重试</button></div>';
      }
      btn.disabled = false; btn.textContent = '重新定位';
    })
    .catch(function() {
      result.classList.remove('hidden');
      result.innerHTML = '<div style="margin-bottom:8px;"><span class="badge badge-danger">网络错误</span></div><div style="text-align:center;"><button class="btn btn-secondary mt-2" onclick="getLocation()">重试</button></div>';
      btn.disabled = false; btn.textContent = '获取位置';
    });
  } else {
    locationVerified = true;
    showNameStep();
    btn.disabled = false; btn.textContent = '重新定位';
  }
}

function showNameStep() {
  document.getElementById('stepLocation').classList.add('hidden');
  document.getElementById('stepName').classList.remove('hidden');
  document.getElementById('stepTitle').textContent = '第2步：确认签到';
}

function submitByName() {
  var name = document.getElementById('userName').value.trim();
  if (!name) return alert('请输入姓名');
  var btn = document.getElementById('checkinBtn');
  var result = document.getElementById('checkinResult');
  btn.disabled = true; btn.textContent = '签到中...';
  result.classList.remove('hidden');
  result.innerHTML = '<div class="spinner" style="margin:0 auto"></div><p class="mt-1">处理中...</p>';

  var endpoint = qrType === 'checkout' ? '/api/check/out' : '/api/check/in';
  fetch(API + endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token: token, face_image_base64: '', latitude: userLat, longitude: userLng, user_name: name, source: coordSource}),
  })
  .then(function(resp) { return resp.json().then(function(data) { return {ok: resp.ok, data: data}; }); })
  .then(function(r) {
    if (r.ok) {
      result.innerHTML = '<div class="badge badge-success" style="font-size:1.2rem">&#x2705; 签到成功!</div><p class="mt-1" style="font-size:1.1rem;font-weight:700">' + r.data.user_name + '</p><p style="font-size:0.82rem;color:var(--ink-muted)">时间: ' + new Date(r.data.check_in_time).toLocaleString() + '</p><p style="font-size:0.82rem;color:var(--ink-muted)">距离: ' + (r.data.distance_meters || '?') + 'm</p>';
      document.getElementById('statusCard').classList.remove('hidden');
      document.getElementById('statusTitle').textContent = '已签到';
      document.getElementById('mainCard').classList.add('hidden');
    } else {
      result.innerHTML = '<div class="badge badge-danger">' + (r.data.detail || '失败') + '</div>';
      btn.disabled = false; btn.textContent = '确认签到';
    }
  })
  .catch(function(e) {
    result.innerHTML = '<div class="badge badge-danger">网络错误: ' + e.message + '</div>';
    btn.disabled = false; btn.textContent = '确认签到';
  });
}

function showToast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast toast-' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}
</script>
</body>
</html>
