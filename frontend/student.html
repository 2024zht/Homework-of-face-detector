<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的签到</title>
<link rel="stylesheet" href="/frontend/css/app.css">
<style>
.signin-options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.signin-option { cursor: pointer; padding: 24px 16px; border-radius: var(--radius); border: 2px solid var(--border); text-align: center; transition: all .15s; background: var(--surface); }
.signin-option:hover { border-color: var(--brand); box-shadow: var(--shadow); transform: translateY(-2px); }
.signin-option .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
.signin-option .title { font-weight: 650; font-size: 1rem; }
.signin-option .desc { font-size: .78rem; color: var(--ink-muted); }
@media (max-width: 380px) { .signin-options { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">&#x1f3e2; 实验室签到</div>
  <div class="topbar-nav">
    <span id="userName" style="font-size:.85rem;color:var(--ink-secondary)"></span>
    <button onclick="logout()">退出</button>
  </div>
</div>

<div class="container">
  <div class="card text-center" style="padding:28px">
    <div style="font-size:2.5rem" id="statusIcon">&#x23f3;</div>
    <h2 class="mt-1" id="statusTitle">加载中...</h2>
    <p id="statusDetail" style="font-size:.9rem"></p>
    <p id="statusTime" style="font-size:.78rem;color:var(--ink-muted)"></p>
  </div>

  <div class="card" style="padding:16px 20px">
    <p style="font-size:.9rem;font-weight:600;margin-bottom:12px">选择签到方式</p>
    <div class="signin-options">
      <div class="signin-option" onclick="scanQR()">
        <span class="icon">&#x1f4f1;</span><div class="title">扫码签到</div><div class="desc">扫描实验室大屏二维码</div>
      </div>
      <div class="signin-option" onclick="cameraSignin()">
        <span class="icon">&#x1f4f7;</span><div class="title">摄像头签到</div><div class="desc">拍照进行人脸识别</div>
      </div>
    </div>
  </div>

  <div class="card mt-2">
    <h3 class="mb-2">&#x1f4dd; 签到记录</h3>
    <div class="table-wrap" id="historyTable">
      <p style="color:var(--ink-muted);text-align:center;padding:20px">加载中...</p>
    </div>
  </div>
</div>

<script>
var API = window.location.origin;
var TOKEN = localStorage.getItem('token');
var USER = JSON.parse(localStorage.getItem('user') || '{}');
if (!TOKEN) window.location.href = '/login.html';
document.getElementById('userName').textContent = USER.name || USER.username;

async function api(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, {'Authorization': 'Bearer ' + TOKEN});
  var r = await fetch(API + url, opts);
  if (r.status === 401) { localStorage.clear(); window.location.href = '/login.html'; }
  return r;
}

(async function() {
  // Load status
  var r = await api('/api/check/status?user_id=' + USER.id);
  var d = await r.json();
  if (d.is_checked_in) {
    document.getElementById('statusIcon').innerHTML = '&#x2705;';
    document.getElementById('statusTitle').textContent = '已签到';
    document.getElementById('statusDetail').textContent = '地点: ' + (d.location_name || '-');
    var t = '签到: ' + new Date(d.check_in_time).toLocaleString();
    if (d.auto_checkout_at) t += ' | 自动签退: ' + new Date(d.auto_checkout_at).toLocaleTimeString();
    document.getElementById('statusTime').textContent = t;
  } else {
    document.getElementById('statusIcon').innerHTML = '&#x274c;';
    document.getElementById('statusTitle').textContent = '未签到';
    document.getElementById('statusDetail').textContent = '请选择下方签到方式';
    document.getElementById('statusTime').textContent = '';
  }

  // Load history
  var r2 = await api('/api/admin/checkins?user_id=' + USER.id);
  var records = await r2.json();
  var html = '';
  if (!records || records.length === 0) {
    html = '<p style="color:var(--ink-muted);text-align:center;padding:20px">暂无签到记录</p>';
  } else {
    html = '<table><thead><tr><th>日期</th><th>签到</th><th>签退</th><th>地点</th><th>时长</th></tr></thead><tbody>';
    for (var i = 0; i < Math.min(records.length, 30); i++) {
      var rec = records[i];
      var dur = rec.check_out_time ? Math.round((new Date(rec.check_out_time) - new Date(rec.check_in_time)) / 60000) + ' min' : '进行中';
      html += '<tr><td>' + new Date(rec.check_in_time).toLocaleDateString() + '</td><td>' + new Date(rec.check_in_time).toLocaleTimeString() + '</td><td>' + (rec.check_out_time ? new Date(rec.check_out_time).toLocaleTimeString() : '-') + '</td><td>' + (rec.location_name || '-') + '</td><td>' + dur + '</td></tr>';
    }
    html += '</tbody></table>';
  }
  document.getElementById('historyTable').innerHTML = html;
})();

function scanQR() { window.open('/checkin.html', '_blank'); }
function cameraSignin() { window.open('/camera-checkin.html', '_blank'); }
function logout() { localStorage.clear(); window.location.href = '/login.html'; }
</script>
</body>
</html>
