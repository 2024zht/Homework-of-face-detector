<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的签到</title>
<link rel="stylesheet" href="/frontend/css/app.css">
<style>
.qr-img { width: 200px; height: 200px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.glass-toast { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn .3s ease; }
.glass-toast-bg { background: rgba(255,255,255,.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; padding: 40px 32px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.15); max-width: 320px; width: 85%; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Sign-in picker modal ──────────────────────── */
.picker-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 420px) { .picker-panels { grid-template-columns: 1fr; } }
.picker-panel {
  cursor: pointer; padding: 28px 16px; border-radius: var(--radius);
  border: 2px solid var(--border); text-align: center;
  transition: all 0.15s; background: var(--bg);
}
.picker-panel:hover { border-color: var(--brand); background: var(--brand-subtle); transform: translateY(-2px); box-shadow: var(--shadow); }
.picker-panel .picon { font-size: 2.8rem; display: block; margin-bottom: 10px; }
.picker-panel .ptitle { font-weight: 650; font-size: 1rem; margin-bottom: 4px; }
.picker-panel .pdesc { font-size: 0.78rem; color: var(--ink-muted); }
.picker-panel.active-panel { border-color: var(--brand); background: var(--brand-subtle); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">&#x1f3e2; 实验室签到</div>
  <div class="topbar-nav">
    <span id="userName"></span>
    <button onclick="logout()">退出</button>
  </div>
</div>

<div class="container">
  <!-- Status -->
  <div class="card text-center" style="padding:28px">
    <div style="font-size:2.5rem" id="statusIcon">&#x23f3;</div>
    <h2 class="mt-1" id="statusTitle">加载中...</h2>
    <p id="statusDetail" style="font-size:.9rem"></p>
    <p id="statusTime" style="font-size:.78rem;color:var(--ink-muted)"></p>
    <button class="btn btn-danger mt-2 hidden" id="signoutBtn" onclick="doSignOut()" style="margin:8px auto 0">&#x1f6aa; 签退</button>
  </div>

  <!-- Session list -->
  <div class="card" style="padding:20px" id="signinCard">
    <p style="font-size:.9rem;font-weight:650;margin-bottom:14px" id="signinCardTitle">签到任务</p>
    <div id="sessionSigninList"></div>
  </div>

  <!-- History -->
  <div class="card mt-2">
    <h3 class="mb-2">&#x1f4dd; 签到记录</h3>
    <div class="table-wrap" id="historyTable"><p style="color:var(--ink-muted);text-align:center;padding:20px">加载中...</p></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent" style="max-width:420px;text-align:center">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button class="btn btn-secondary mt-2" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
var API = window.location.origin;
var TOKEN = localStorage.getItem('token');
var USER = JSON.parse(localStorage.getItem('user') || '{}');
if (!TOKEN) window.location.href = '/login.html';
document.getElementById('userName').textContent = USER.name || USER.username;
var _stream = null;
var _refreshTimer = null;

function closeModal() {
  if (_stream) { _stream.getTracks().forEach(function(t){t.stop()}); _stream = null; }
  _signinSessionId = null;
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('modalContent').style.maxWidth = '420px';
}

async function api(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, {'Authorization': 'Bearer ' + TOKEN});
  var r = await fetch(API + url, opts);
  if (r.status === 401) { localStorage.clear(); window.location.href = '/login.html'; }
  return r;
}

// ── Load all data (status + session + history) ──────────
async function loadAll() {
  // Session status - get all visible sessions
  var hasActiveSession = false;
  var sessions = [];
  var anyTimeValid = false;
  try {
    var sR = await api('/api/check/session/active');
    var sD = await sR.json();
    hasActiveSession = sD.has_active_session;
    sessions = sD.sessions || [];
    anyTimeValid = sessions.some(function(s){return s.time_valid;});
  } catch(e) {}

  // Check-in status
  var r = await api('/api/check/status?user_id=' + USER.id);
  var d = await r.json();

  var listDiv = document.getElementById('sessionSigninList');
  var cardTitle = document.getElementById('signinCardTitle');
  var dayLabels = {'0':'一','1':'二','2':'三','3':'四','4':'五','5':'六','6':'日'};

  if (d.is_checked_in) {
    document.getElementById('statusIcon').innerHTML = '&#x2705;';
    document.getElementById('statusTitle').textContent = '已签到';
    document.getElementById('statusDetail').textContent = '地点: ' + (d.location_name || '-');
    var t = '签到: ' + new Date(d.check_in_time).toLocaleString();
    if (d.auto_checkout_at) t += ' | 自动签退: ' + new Date(d.auto_checkout_at).toLocaleTimeString();
    document.getElementById('statusTime').textContent = t;
    var soBtn = document.getElementById('signoutBtn');
    soBtn.classList.remove('hidden');
    soBtn.disabled = false;
    soBtn.innerHTML = '&#x1f6aa; 签退';
    listDiv.innerHTML = '';
    cardTitle.textContent = '签到任务';
  } else if (!hasActiveSession) {
    document.getElementById('statusIcon').innerHTML = '&#x23f3;';
    document.getElementById('statusTitle').textContent = '暂无签到任务';
    document.getElementById('statusDetail').textContent = '请等待教师发布签到任务';
    document.getElementById('statusTime').textContent = '';
    document.getElementById('signoutBtn').classList.add('hidden');
    listDiv.innerHTML = '<p style="color:var(--ink-muted);text-align:center;padding:16px 0;font-size:0.9rem">暂无签到任务</p>';
    cardTitle.textContent = '签到任务';
  } else {
    var validSessions = sessions.filter(function(s){return s.time_valid;});
    document.getElementById('statusIcon').innerHTML = '&#x1f4e3;';
    document.getElementById('statusTitle').textContent = (validSessions.length || sessions.length) + ' 个任务可签到';
    document.getElementById('statusDetail').textContent = '';
    document.getElementById('statusTime').textContent = '';
    document.getElementById('signoutBtn').classList.add('hidden');
    cardTitle.textContent = '可签到的任务';

    var html = '';
    for (var i = 0; i < sessions.length; i++) {
      var s = sessions[i];
      var metaParts = [];
      metaParts.push('<b>' + (s.location_name || '-') + '</b>');
      if (s.checkin_start_time) metaParts.push(s.checkin_start_time + '–' + s.checkin_end_time);
      if (s.start_date) metaParts.push((s.start_date||'') + (s.end_date?' → '+s.end_date:''));
      if (s.recurring_days) {
        var days = s.recurring_days.split(',').map(function(d){return '周'+dayLabels[d];}).join('·');
        metaParts.push(days);
      }
      var disabled = s.time_valid ? '' : ' disabled';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;font-size:0.86rem">';
      html += '<div>' + metaParts.join(' <span style="color:var(--ink-muted);font-size:0.7rem">·</span> ') + '</div>';
      html += '<button class="btn ' + (s.time_valid ? 'btn-primary' : 'btn-secondary') + '" style="padding:6px 18px;font-size:0.82rem;flex-shrink:0" onclick="openSigninPicker(' + s.id + ',\'' + (s.location_name||'') + '\',\'' + (s.checkin_start_time||'') + '–' + (s.checkin_end_time||'') + '\')"' + disabled + '>' + (s.time_valid ? '签到' : '非签到时间') + '</button>';
      html += '</div>';
    }
    listDiv.innerHTML = html;
  }

  // History
  var r2 = await api('/api/admin/checkins?user_id=' + USER.id);
  var records = await r2.json();
  var html = '';
  if (!records || records.length === 0) {
    html = '<p style="color:var(--ink-muted);text-align:center;padding:20px">暂无签到记录</p>';
  } else {
    html = '<table><thead><tr><th>日期</th><th>签到</th><th>签退</th><th>地点</th><th>时长</th></tr></thead><tbody>';
    for (var i = 0; i < Math.min(records.length, 30); i++) {
      var rec = records[i];
      var dur = rec.check_out_time ? Math.round((new Date(rec.check_out_time) - new Date(rec.check_in_time)) / 60000) + ' min' : '进行中';
      html += '<tr><td>' + new Date(rec.check_in_time).toLocaleDateString() + '</td><td>' + new Date(rec.check_in_time).toLocaleTimeString() + '</td><td>' + (rec.check_out_time ? new Date(rec.check_out_time).toLocaleTimeString() : '-') + '</td><td>' + (rec.location_name || '-') + '</td><td>' + dur + '</td></tr>';
    }
    html += '</tbody></table>';
  }
  document.getElementById('historyTable').innerHTML = html;
}

loadAll();
// Auto-refresh every 5 seconds
_refreshTimer = setInterval(loadAll, 5000);

// ── Sign-in Picker Modal ───────────────────────────────
var _signinSessionId = null;
var _pickerLocName = '';
var _pickerTimeRange = '';

function openSigninPicker(sessionId, locationName, timeRange) {
  _signinSessionId = sessionId;
  _pickerLocName = locationName || '';
  _pickerTimeRange = timeRange || '';
  document.getElementById('modalTitle').textContent = '选择签到方式';
  document.getElementById('modalBody').innerHTML =
    '<p style="text-align:center;font-size:0.88rem;color:var(--ink-secondary);margin-bottom:16px">' +
    '<b>' + _pickerLocName + '</b>' + (_pickerTimeRange ? ' · ' + _pickerTimeRange : '') + '</p>' +
    '<div class="picker-panels">' +
    '<div class="picker-panel" onclick="showQRInPicker()" id="qrPanel">' +
    '<span class="picon">&#x1f4f1;</span>' +
    '<div class="ptitle">扫码签到</div>' +
    '<div class="pdesc">生成二维码，用手机扫描完成签到</div>' +
    '</div>' +
    '<div class="picker-panel" onclick="showCamInPicker()" id="camPanel">' +
    '<span class="picon">&#x1f4f7;</span>' +
    '<div class="ptitle">拍照签到</div>' +
    '<div class="pdesc">打开摄像头，人脸识别自动签到</div>' +
    '</div>' +
    '</div>';
  document.getElementById('modalContent').style.maxWidth = '520px';
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function openCameraSignin(sessionId) {
  _signinSessionId = sessionId || null;
  document.getElementById('modalTitle').textContent = '人脸识别签到';
  document.getElementById('modalBody').innerHTML = '<video id="camVideo" autoplay playsinline style="width:100%;border-radius:8px;max-height:300px"></video><canvas id="camCanvas" class="hidden"></canvas><button class="btn btn-primary btn-block mt-2" onclick="takeFacePhoto()" id="camBtn">&#x1f4f8; 拍照识别</button><div id="camResult" class="mt-2"></div>';
  document.getElementById('modalContent').style.maxWidth = '420px';
  document.getElementById('modalOverlay').classList.remove('hidden');
  navigator.mediaDevices.getUserMedia({video: {facingMode: 'user'}}).then(function(stream) {
    _stream = stream;
    document.getElementById('camVideo').srcObject = stream;
  }).catch(function(e) {
    document.getElementById('modalBody').innerHTML = '<div class="badge badge-danger">无法访问摄像头</div>';
  });
}

async function showQRInPicker() {
  document.getElementById('qrPanel').classList.add('active-panel');
  document.getElementById('camPanel').classList.remove('active-panel');
  document.getElementById('modalBody').innerHTML =
    '<div class="spinner" style="margin:20px auto"></div><p>生成二维码...</p>';
  document.getElementById('modalContent').style.maxWidth = '420px';
  try {
    var r = await api('/api/qr/self', {method: 'POST'});
    var d = await r.json();
    document.getElementById('modalTitle').textContent = '扫码签到';
    document.getElementById('modalBody').innerHTML =
      '<div style="text-align:center">' +
      '<img src="' + d.qr_url + '" class="qr-img" alt="QR">' +
      '<p style="font-size:.82rem;color:var(--ink-muted);margin-top:8px;word-break:break-all">' + d.checkin_url + '</p>' +
      '<p style="font-size:.75rem;color:var(--ink-muted)">有效期至: ' + new Date(d.expires_at).toLocaleString() + '</p>' +
      '<p style="font-size:.8rem;margin-top:8px">用手机扫描二维码完成签到</p>' +
      '<button class="btn btn-secondary mt-2" onclick="openSigninPicker(_signinSessionId,_pickerLocName,_pickerTimeRange)">&#x2190; 返回选择</button>' +
      '</div>';
  } catch(e) {
    document.getElementById('modalBody').innerHTML = '<p class="badge badge-danger">生成失败，请重试</p>';
  }
}

function showCamInPicker() {
  document.getElementById('camPanel').classList.add('active-panel');
  document.getElementById('qrPanel').classList.remove('active-panel');
  openCameraSignin(_signinSessionId);
}

function takeFacePhoto() {
  var video = document.getElementById('camVideo');
  var canvas = document.getElementById('camCanvas');
  var btn = document.getElementById('camBtn');
  var result = document.getElementById('camResult');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  var b64 = canvas.toDataURL('image/jpeg', 0.85);
  btn.disabled = true; btn.textContent = '识别中...';
  result.innerHTML = '<div class="spinner" style="margin:8px auto"></div>';

  var body = {token: 'camera-direct', face_image_base64: b64, latitude: null, longitude: null, user_name: USER.name};
  if (_signinSessionId) body.session_id = _signinSessionId;

  fetch(API + '/api/check/in', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.id) {
      closeModal();
      showGlassToast('&#x2705;', '签到成功', d.user_name, (d.location_name || ''));
      loadAll();
    } else {
      result.innerHTML = '<div class="badge badge-danger">&#x274c; ' + (d.detail || '失败') + '</div>';
      btn.disabled = false; btn.textContent = '重试';
    }
  }).catch(function(e) {
    result.innerHTML = '<div class="badge badge-danger">' + e.message + '</div>';
    btn.disabled = false; btn.textContent = '重试';
  });
}

function showGlassToast(icon, title, name, location) {
  var div = document.createElement('div');
  div.className = 'glass-toast';
  div.innerHTML = '<div class="glass-toast-bg">' +
    '<div style="font-size:3rem">' + icon + '</div>' +
    '<h2 style="margin-top:8px">' + title + '</h2>' +
    '<p style="font-size:1.1rem;font-weight:700;margin-top:4px">' + name + '</p>' +
    '<p style="font-size:.85rem;color:var(--ink-secondary);margin-top:4px">地点: ' + location + '</p>' +
    '<p style="font-size:.8rem;color:var(--ink-muted);margin-top:4px">' + new Date().toLocaleTimeString() + '</p>' +
  '</div>';
  document.body.appendChild(div);
  setTimeout(function() { div.remove(); }, 3000);
  div.addEventListener('click', function() { div.remove(); });
}

// Also show toast when QR scan check-in is detected
var _wasCheckedIn = null;
var _origLoadAll = loadAll;
loadAll = async function() {
  var wasIn = _wasCheckedIn;
  await _origLoadAll();
  var nowIn = document.getElementById('statusTitle').textContent === '已签到';
  if (wasIn === false && nowIn === true) {
    // Close any open modal
    closeModal();
    showGlassToast('&#x2705;', '签到成功', USER.name, document.getElementById('statusDetail').textContent.replace('地点: ', ''));
  }
  _wasCheckedIn = nowIn;
};
setTimeout(function() { _wasCheckedIn = document.getElementById('statusTitle').textContent === '已签到'; }, 2000);

async function doSignOut() {
  if (!confirm('确认签退？')) return;
  var btn = document.getElementById('signoutBtn');
  btn.disabled = true; btn.textContent = '签退中...';
  try {
    var r = await api('/api/check/self-out', {method: 'POST'});
    var d = await r.json();
    if (d.status === 'completed') {
      await loadAll();
    } else {
      alert(d.detail || '签退失败');
      btn.disabled = false; btn.textContent = '&#x1f6aa; 签退';
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '&#x1f6aa; 签退';
  }
}

function logout() { localStorage.clear(); if(_refreshTimer) clearInterval(_refreshTimer); window.location.href = '/login.html'; }
</script>
</body>
</html>
